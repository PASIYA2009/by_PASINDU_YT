<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASIYA-MD - Premium Pairing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --primary-blue: #00d2ff;
            --dark-bg: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --text-light: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* පසුබිමේ ඇනිමේෂන් එකක් */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary-blue);
            filter: blur(150px);
            opacity: 0.15;
            top: 10%;
            left: 10%;
            z-index: -1;
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.1; }
            100% { transform: scale(1.5); opacity: 0.2; }
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 100%;
            animation: fadeInScale 0.6s ease-out;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 70px;
            height: 70px;
            margin: 0 auto 20px;
            background: rgba(0, 210, 255, 0.1);
            border: 2px solid var(--primary-blue);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo i {
            font-size: 35px;
            color: var(--primary-blue);
            filter: drop-shadow(0 0 5px var(--primary-blue));
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #cbd5e1;
            font-weight: 500;
            margin-bottom: 10px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-blue);
        }

        input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 16px;
            color: white;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-blue);
            color: var(--dark-bg);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.4);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(0);
        }

        .spinner {
            border: 3px solid rgba(15, 23, 42, 0.3);
            border-top: 3px solid var(--dark-bg);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            display: none;
            text-align: center;
            animation: slideDown 0.4s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .code-display {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed var(--primary-blue);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .code {
            font-size: 36px;
            font-weight: 800;
            color: var(--primary-blue);
            letter-spacing: 8px;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        .instructions {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            font-size: 13px;
            color: #94a3b8;
            border-left: 3px solid var(--primary-blue);
        }

        .instructions ol {
            margin-left: 18px;
            margin-top: 10px;
        }

        .instructions li {
            margin-bottom: 6px;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--primary-blue);
        }

        /* Success/Error Colors */
        .result.success { border: 1px solid #10b981; background: rgba(16, 185, 129, 0.1); color: #34d399; display: block; }
        .result.error { border: 1px solid #ef4444; background: rgba(239, 68, 68, 0.1); color: #f87171; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fab fa-whatsapp"></i>
            </div>
            <h1>PASIYA-MD</h1>
            <p class="subtitle">Secure Device Pairing</p>
        </div>

        <form id="pairForm">
            <div class="form-group">
                <label>WhatsApp Number</label>
                <div class="input-wrapper">
                    <i class="fas fa-mobile-alt input-icon"></i>
                    <input 
                        type="tel" 
                        id="phoneNumber" 
                        placeholder="94771234567" 
                        required
                    >
                </div>
            </div>

            <button type="submit" class="btn" id="submitBtn">
                <div class="spinner"></div>
                <span class="btn-text">GENERATE CODE</span>
            </button>
        </form>

        <div id="result" class="result"></div>

        <div class="instructions">
            <strong><i class="fas fa-shield-alt"></i> QUICK GUIDE</strong>
            <ol>
                <li>Enter number with country code.</li>
                <li>Go to WhatsApp > Linked Devices.</li>
                <li>Tap 'Link with phone number'.</li>
                <li>Enter the 8-digit code.</li>
            </ol>
        </div>

        <a href="/" class="back-link">
            <i class="fas fa-chevron-left"></i> Return to Home
        </a>
    </div>

    <script>
        const form = document.getElementById('pairForm');
        const submitBtn = document.getElementById('submitBtn');
        const resultDiv = document.getElementById('result');
        const phoneInput = document.getElementById('phoneNumber');

        phoneInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const phoneNumber = phoneInput.value.trim();
            
            if (phoneNumber.length < 10) {
                showResult('error', 'Invalid phone number format');
                return;
            }

            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            document.querySelector('.spinner').style.display = 'block';
            document.querySelector('.btn-text').style.opacity = '0.5';

            try {
                const response = await fetch(`/code?phone=${phoneNumber}`);
                const data = await response.json();

                if (data.success) {
                    showResult('success', `
                        <div class="code-display">
                            <div class="code">${data.code}</div>
                        </div>
                        <p>Code generated successfully!</p>
                    `);
                } else {
                    showResult('error', data.error || 'Connection failed');
                }
            } catch (error) {
                showResult('error', 'Server error. Try again.');
            } finally {
                submitBtn.disabled = false;
                document.querySelector('.spinner').style.display = 'none';
                document.querySelector('.btn-text').style.opacity = '1';
            }
        });

        function showResult(type, message) {
            resultDiv.className = `result ${type}`;
            resultDiv.innerHTML = message;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
